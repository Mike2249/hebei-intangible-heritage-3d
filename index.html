    <style>

        .logo-icon {

        }

            margin-left: auto; font-size: 13px; color: rgba(201,169,110,0.6);
            letter-spacing: 2px;

        .model-panel {
            position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
            z-index: 100; display: flex; flex-direction: column; gap: 8px;

        .model-btn {

            border: 1px solid rgba(201,169,110,0.25); background: rgba(15,15,25,0.85);

        .model-btn.active {

            isEmbed: true,

    let scene, camera, renderer, controls;

    // ===== 初始化 =====
    function init() {
        const container = document.getElementById('canvas-container');

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.012);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2.5, 5);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.5;
        controls.maxDistance = 15;
        controls.target.set(0, 0.8, 0);
        controls.update();

        setupLights();
        createGround();
        createParticles();
        createButtons();
        showModel(0);

        window.addEventListener('resize', onResize);
        animate();
    }

    function setupLights() {
        // 环境光 - 更亮
        scene.add(new THREE.AmbientLight(0x606070, 0.8));

        // 主光源 - 更亮

        mainLight.position.set(5, 10, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.set(2048, 2048);
        scene.add(mainLight);

        // 补光 - 更亮
        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        // 底部光 - 更亮
        const bottomLight = new THREE.PointLight(0xffd700, 1.2, 20);
        bottomLight.position.set(0, -0.5, 0);
        scene.add(bottomLight);

        // 背光 - 更亮
        const backLight = new THREE.PointLight(0x6688cc, 0.6, 25);
        backLight.position.set(-3, 5, -5);
        scene.add(backLight);

        // 新增：顶部聚光灯
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, 8, 0);
        spotLight.target.position.set(0, 0, 0);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.3;
        spotLight.castShadow = true;
        scene.add(spotLight);
        scene.add(spotLight.target);

        // 新增：侧面补光
        const sideLight = new THREE.DirectionalLight(0xffeecc, 0.8);
        sideLight.position.set(5, 3, -5);
        scene.add(sideLight);
    }

    function createGround() {
        const platformGeo = new THREE.CylinderGeometry(2.5, 2.8, 0.15, 64);
        const platformMat = new THREE.MeshPhysicalMaterial({
            color: 0x1a1a2e, metalness: 0.3, roughness: 0.4,
            clearcoat: 0.8, clearcoatRoughness: 0.2,
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.075;
        platform.receiveShadow = true;
        scene.add(platform);

        const ringGeo = new THREE.TorusGeometry(2.65, 0.02, 8, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xc9a96e, transparent: true, opacity: 0.6 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.01;
        scene.add(ring);

        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.9, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.15;
        ground.receiveShadow = true;
        scene.add(ground);
    }

    function createParticles() {
        const count = 500;
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 30;
            positions[i * 3 + 1] = Math.random() * 15;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
            const gold = Math.random() > 0.5;
            colors[i * 3] = gold ? 0.79 : 0.4;
            colors[i * 3 + 1] = gold ? 0.66 : 0.5;
            colors[i * 3 + 2] = gold ? 0.43 : 0.8;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({
            size: 0.05, vertexColors: true, transparent: true, opacity: 0.6,
            blending: THREE.AdditiveBlending, depthWrite: false,
        });
        particleSystem = new THREE.Points(geo, mat);
        scene.add(particleSystem);
    }

    // ===== 写实风格模型构建函数 =====

    // 1. 定瓷 - 写实白瓷梅瓶
    function buildDingVase() {
        const group = new THREE.Group();

        // 更精细的梅瓶轮廓 - 基于真实宋代梅瓶造型
        const points = [];
        const segments = 80;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            let r;
            // 底足
            if (t < 0.03) r = 0.28 + t * 10;
            // 底部外撇
            else if (t < 0.08) r = 0.58 + (t - 0.03) * 3;
            // 腹部鼓起
            else if (t < 0.45) r = 0.73 + Math.sin((t - 0.08) / 0.37 * Math.PI) * 0.18;
            // 收肩
            else if (t < 0.55) r = 0.91 - (t - 0.45) * 3.2;
            // 细长颈部
            else if (t < 0.75) r = 0.59 - (t - 0.55) * 1.8;
            // 口沿外撇
            else if (t < 0.88) r = 0.23 + (t - 0.75) * 0.3;
            // 口沿外翻
            else r = 0.27 + (t - 0.88) * 1.5;
            
            points.push(new THREE.Vector2(Math.max(0.005, r), t * 3.2 - 0.3));
        }

        const geo = new THREE.LatheGeometry(points, 128);
        
        // 写实瓷器材质
        const mat = new THREE.MeshPhysicalMaterial({
            color: 0xf8f4ed,
            metalness: 0.02,
            roughness: 0.08,
            clearcoat: 1.0,
            clearcoatRoughness: 0.02,
            reflectivity: 1.0,
        });
        
        const vase = new THREE.Mesh(geo, mat);
        vase.castShadow = true;
        vase.receiveShadow = true;
        group.add(vase);

        // 添加刻花装饰 - 浮雕效果
        const decorY = [0.8, 1.2, 1.6];
        decorY.forEach((y, idx) => {
            const radius = 0.75 - idx * 0.05;
            // 主装饰带
            const ringGeo = new THREE.TorusGeometry(radius, 0.012, 12, 128);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xe8e0d5, 
                roughness: 0.15,
                metalness: 0.05
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.y = y;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);

            // 辅助装饰线
            const subRingGeo = new THREE.TorusGeometry(radius, 0.005, 8, 128);
            const subRing = new THREE.Mesh(subRingGeo, ringMat);
            subRing.position.y = y + 0.06;
            subRing.rotation.x = Math.PI / 2;
            group.add(subRing);
        });

        // 底部圈足
        const footGeo = new THREE.CylinderGeometry(0.32, 0.35, 0.08, 64);
        const footMat = new THREE.MeshStandardMaterial({ 
            color: 0xe0d8cc, 
            roughness: 0.3 
        });
        const foot = new THREE.Mesh(footGeo, footMat);
        foot.position.y = -0.26;
        foot.castShadow = true;
        group.add(foot);

        group.position.y = 0.6;
        return group;
    }

    // 2. 武强年画 - 3D卷轴形式
    function buildNewYearPrint() {
        const group = new THREE.Group();

        const w = 1.4, h = 2.0, t = 0.12;

        // 画轴（顶部）
        const topRollerGeo = new THREE.CylinderGeometry(0.06, 0.06, w + 0.3, 32);
        const rollerMat = new THREE.MeshPhysicalMaterial({
            color: 0x5c3a21, roughness: 0.4, metalness: 0.1
        });
        const topRoller = new THREE.Mesh(topRollerGeo, rollerMat);
        topRoller.rotation.z = Math.PI / 2;
        topRoller.position.set(0, h/2 + 0.05, 0);
        topRoller.castShadow = true;
        group.add(topRoller);

        // 画轴（底部）
        const bottomRoller = new THREE.Mesh(topRollerGeo, rollerMat);
        bottomRoller.rotation.z = Math.PI / 2;
        bottomRoller.position.set(0, -h/2 - 0.05, 0);
        bottomRoller.castShadow = true;
        group.add(bottomRoller);

        // 轴头装饰
        [-1, 1].forEach(side => {
            const endCapGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const endCapMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.3 });
            
            const topCap = new THREE.Mesh(endCapGeo, endCapMat);
            topCap.position.set(side * (w/2 + 0.15), h/2 + 0.05, 0);
            group.add(topCap);
            
            const bottomCap = new THREE.Mesh(endCapGeo, endCapMat);
            bottomCap.position.set(side * (w/2 + 0.15), -h/2 - 0.05, 0);
            group.add(bottomCap);
        });

        // 画框
        const frameShape = new THREE.Shape();
        frameShape.moveTo(-w/2, -h/2);
        frameShape.lineTo(w/2, -h/2);
        frameShape.lineTo(w/2, h/2);
        frameShape.lineTo(-w/2, h/2);
        frameShape.lineTo(-w/2, -h/2);
        
        const hole = new THREE.Path();
        hole.moveTo(-w/2 + t, -h/2 + t);
        hole.lineTo(w/2 - t, -h/2 + t);
        hole.lineTo(w/2 - t, h/2 - t);
        hole.lineTo(-w/2 + t, h/2 - t);
        hole.lineTo(-w/2 + t, -h/2 + t);
        frameShape.holes.push(hole);

        const frameGeo = new THREE.ExtrudeGeometry(frameShape, { 
            depth: 0.06, bevelEnabled: true, bevelThickness: 0.015, 
            bevelSize: 0.015, bevelSegments: 3 
        });
        const frameMat = new THREE.MeshPhysicalMaterial({
            color: 0x8b4513, roughness: 0.5, metalness: 0.1,
        });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.z = -0.03;
        frame.castShadow = true;
        group.add(frame);

        // 画面 - 高分辨率Canvas绘制
        const canvas = document.createElement('canvas');
        canvas.width = 1024; canvas.height = 1460;
        const ctx = canvas.getContext('2d');

        // 红色底纹
        const gradient = ctx.createLinearGradient(0, 0, 0, 1460);

    // 3. 蔚县剪纸 - 多层镂空效果
    function buildPaperCutting() {
        const group = new THREE.Group();

        // 创建多层剪纸效果
        const layers = 3;
        
        for (let layer = 0; layer < layers; layer++) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            const offset = layer * 0.02;
            const scale = 1 - layer * 0.05;

            // 背景
            ctx.fillStyle = layer === 0 ? '#f5f0e8' : 'transparent';
            ctx.fillRect(0, 0, 1024, 1024);

            // 剪纸主体 - 凤凰图案
            ctx.save();
            ctx.translate(512, 512);
            ctx.scale(scale, scale);

            // 外层轮廓
            ctx.strokeStyle = '#b22222';
            ctx.fillStyle = '#cc3333';
            ctx.lineWidth = 3;

            // 凤凰身体
            ctx.beginPath();
            ctx.ellipse(0, 50, 80, 120, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 凤头
            ctx.beginPath();
            ctx.ellipse(0, -100, 35, 45, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 凤冠
            ctx.fillStyle = '#ffd700';
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.arc(i * 15, -140, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            // 翅膀
            ctx.fillStyle = '#cc3333';
            ctx.strokeStyle = '#b22222';
            
            // 左翼
            ctx.beginPath();
            ctx.moveTo(-60, 0);
            ctx.quadraticCurveTo(-180, -80, -200, -20);
            ctx.quadraticCurveTo(-220, 60, -150, 100);
            ctx.quadraticCurveTo(-100, 80, -60, 40);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 右翼
            ctx.beginPath();
            ctx.moveTo(60, 0);
            ctx.quadraticCurveTo(180, -80, 200, -20);
            ctx.quadraticCurveTo(220, 60, 150, 100);
            ctx.quadraticCurveTo(100, 80, 60, 40);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 尾羽
            for (let i = -3; i <= 3; i++) {
                if (i === 0) continue;
                ctx.beginPath();
                ctx.moveTo(i * 15, 150);
                ctx.quadraticCurveTo(i * 40, 250, i * 25, 350);
                ctx.quadraticCurveTo(i * 10, 300, i * 12, 200);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            // 镂空花纹
            ctx.fillStyle = '#f5f0e8';
            ctx.globalCompositeOperation = 'destination-out';
            
            // 圆形镂空
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const x = Math.cos(angle) * 180;
                const y = Math.sin(angle) * 180;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }

            // 羽毛纹理镂空
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.ellipse(-120 + i * 12, -40 + Math.sin(i) * 20, 3, 15, i * 0.1, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();

            // 点彩效果（蔚县剪纸特色）- 只在顶层
            if (layer === 0) {
                ctx.globalCompositeOperation = 'source-over';
                const colors = ['#22aa44', '#ffdd00', '#ff6600', '#0088cc', '#ff44aa', '#9932cc'];
                for (let i = 0; i < 150; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 100 + Math.random() * 200;
                    const x = 512 + Math.cos(angle) * dist;
                    const y = 512 + Math.sin(angle) * dist;
                    
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.globalAlpha = 0.5 + Math.random() * 0.3;
                    ctx.beginPath();
                    ctx.arc(x, y, 4 + Math.random() * 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            const texture = new THREE.CanvasTexture(canvas);
            
            const paperGeo = new THREE.PlaneGeometry(2.8, 2.8);
            const paperMat = new THREE.MeshBasicMaterial({
                map: texture, 
                transparent: true, 
                side: THREE.DoubleSide,
                alphaTest: 0.1
            });
            const paper = new THREE.Mesh(paperGeo, paperMat);
            paper.position.z = offset;
            group.add(paper);
        }

        // 外框
        const frameGeo = new THREE.TorusGeometry(1.5, 0.03, 8, 64);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        group.add(frame);

        group.position.y = 1.5;
        return group;
    }

    // 4. 磁州窑 - 写实白地黑花罐
    function buildCizhouVase() {
        const group = new THREE.Group();

        // 写实罐形
        const points = [];
        const segments = 100;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            let r;
            
            if (t < 0.03) r = 0.25 + t * 12;
            else if (t < 0.08) r = 0.61;
            else if (t < 0.15) r = 0.61 + (t - 0.08) * 2;
            else if (t < 0.5) r = 0.75 + Math.sin((t - 0.15) / 0.35 * Math.PI) * 0.28;
            else if (t < 0.65) r = 1.03 - (t - 0.5) * 3.2;
            else if (t < 0.78) r = 0.55 - (t - 0.65) * 1.5;
            else if (t < 0.88) r = 0.355 + (t - 0.78) * 0.5;
            else r = 0.405 + (t - 0.88) * 1.2;
            
            points.push(new THREE.Vector2(Math.max(0.005, r), t * 2.8 - 0.25));
        }

        const geo = new THREE.LatheGeometry(points, 128);
        const mat = new THREE.MeshPhysicalMaterial({
            color: 0xf0ebe0,
            metalness: 0.01,
            roughness: 0.25,
            clearcoat: 0.5,
            clearcoatRoughness: 0.2,
        });
        
        const jar = new THREE.Mesh(geo, mat);
        jar.castShadow = true;
        jar.receiveShadow = true;
        group.add(jar);

        // 黑花装饰纹理
        const canvas = document.createElement('canvas');
        canvas.width = 2048; canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // 白底
        ctx.fillStyle = '#f0ebe0';
        ctx.fillRect(0, 0, 2048, 1024);

        // 上下边饰
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 20, 2048, 25);
        ctx.fillRect(0, 979, 2048, 25);
        ctx.fillRect(0, 55, 2048, 8);
        ctx.fillRect(0, 961, 2048, 8);

        // 绘制牡丹
        function drawPeony(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            // 花瓣
            ctx.fillStyle = '#1a1a1a';
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.ellipse(Math.cos(angle) * 40, Math.sin(angle) * 40, 35, 20, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 内层花瓣
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2 + 0.3;
                ctx.beginPath();
                ctx.ellipse(Math.cos(angle) * 25, Math.sin(angle) * 25, 20, 12, angle, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 花心
            ctx.fillStyle = '#2a2a2a';
            ctx.beginPath();
            ctx.arc(0, 0, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // 绘制叶子
        function drawLeaf(x, y, angle, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.scale(scale, scale);
            
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(30, -20, 80, 0);
            ctx.quadraticCurveTo(30, 20, 0, 0);
            ctx.fill();
            
            // 叶脉
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(5, 0);
            ctx.lineTo(70, 0);
            ctx.stroke();
            
            ctx.restore();
        }

        // 主纹饰带
        drawPeony(400, 512, 1.2);
        drawPeony(1024, 450, 1.5);
        drawPeony(1648, 512, 1.2);

        // 叶子
        drawLeaf(250, 512, -0.5, 1.0);
        drawLeaf(550, 480, 0.3, 0.9);
        drawLeaf(850, 550, -0.4, 1.1);
        drawLeaf(1200, 480, 0.5, 0.95);
        drawLeaf(1450, 520, -0.3, 1.0);
        drawLeaf(1800, 500, 0.4, 0.9);

        // 卷草纹
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 4;
        ctx.beginPath();
        for (let x = 0; x < 2048; x += 50) {
            ctx.moveTo(x, 750);
            ctx.quadraticCurveTo(x + 25, 720 + Math.sin(x * 0.01) * 30, x + 50, 750);
        }
        ctx.stroke();

        // 底部莲瓣纹
        for (let i = 0; i < 16; i++) {
            const x = 100 + i * 120;
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.moveTo(x, 900);
            ctx.quadraticCurveTo(x + 30, 850, x + 60, 900);
            ctx.lineTo(x + 60, 950);
            ctx.quadraticCurveTo(x + 30, 920, x, 950);
            ctx.closePath();
            ctx.fill();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        texture.anisotropy = 16;

        // 贴花
        const decalGeo = new THREE.CylinderGeometry(1.05, 1.05, 2.3, 128, 1, true);
        const decalMat = new THREE.MeshStandardMaterial({
            map: texture, 
            transparent: true,
            roughness: 0.3,
        });
        const decal = new THREE.Mesh(decalGeo, decalMat);
        decal.position.y = 1.15;
        group.add(decal);

        // 底部圈足
        const footGeo = new THREE.CylinderGeometry(0.28, 0.32, 0.1, 64);
        const footMat = new THREE.MeshStandardMaterial({ color: 0xd0c8b8, roughness: 0.4 });
        const foot = new THREE.Mesh(footGeo, footMat);
        foot.position.y = -0.22;
        foot.castShadow = true;
        group.add(foot);

        group.position.y = 0.4;
        return group;
    }

        leftShoulder.position.set(-0.22, 1.9, 0);
        group.add(leftShoulder);

        const leftArmGeo = new THREE.CylinderGeometry(0.045, 0.04, 0.55, 12);
        const leftArm = new THREE.Mesh(leftArmGeo, costumeRed);
        leftArm.position.set(-0.5, 1.85, 0);
        leftArm.rotation.z = Math.PI / 2;
        leftArm.castShadow = true;
        group.add(leftArm);

        const leftHandGeo = new THREE.SphereGeometry(0.05, 12, 12);
        const leftHand = new THREE.Mesh(leftHandGeo, skinMat);
        leftHand.position.set(-0.8, 1.85, 0);
        group.add(leftHand);

        // 右臂（上举托碗）
        const rightShoulderGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const rightShoulder = new THREE.Mesh(rightShoulderGeo, costumeRed);
        rightShoulder.position.set(0.22, 1.9, 0);
        group.add(rightShoulder);

        const rightArmGeo = new THREE.CylinderGeometry(0.045, 0.04, 0.5, 12);
        const rightArm = new THREE.Mesh(rightArmGeo, costumeRed);
        rightArm.position.set(0.35, 2.05, 0);
        rightArm.rotation.z = -0.4;
        rightArm.castShadow = true;
        group.add(rightArm);

        const rightForearmGeo = new THREE.CylinderGeometry(0.04, 0.035, 0.45, 12);
        const rightForearm = new THREE.Mesh(rightForearmGeo, skinMat);
        rightForearm.position.set(0.5, 2.35, 0);
        rightForearm.rotation.z = -0.2;
        group.add(rightForearm);

        const rightHandGeo = new THREE.SphereGeometry(0.05, 12, 12);
        const rightHand = new THREE.Mesh(rightHandGeo, skinMat);
        rightHand.position.set(0.58, 2.55, 0);
        group.add(rightHand);

        // 碗1（手上）
        const bowl1 = createBowl(0.12, 0.06);
        bowl1.position.set(0.58, 2.65, 0);
        bowl1.castShadow = true;
        group.add(bowl1);

        // 碗2（头顶）
        const bowl2 = createBowl(0.14, 0.07);
        bowl2.position.set(0, 2.32, 0);
        bowl2.castShadow = true;
        group.add(bowl2);

        // 碗3（最上）
        const bowl3 = createBowl(0.1, 0.05);
        bowl3.position.set(0, 2.45, 0);
        bowl3.castShadow = true;
        group.add(bowl3);

        // 底座
        const baseGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.12, 32);
        const baseMat = new THREE.MeshPhysicalMaterial({
            color: 0x8b4513, roughness: 0.5, metalness: 0.1
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = 0.06;
        base.castShadow = true;
        group.add(base);

        group.position.y = 0.1;
        return group;
    }

    function createBowl(radius, height) {
        const points = [];
        for (let i = 0; i <= 16; i++) {
            const t = i / 16;
            const r = radius * (0.25 + 0.75 * Math.pow(t, 0.6));
            points.push(new THREE.Vector2(Math.max(0.005, r), t * height));
        }
        const geo = new THREE.LatheGeometry(points, 32);
        const mat = new THREE.MeshPhysicalMaterial({
            color: 0xf5f0e8, roughness: 0.15, metalness: 0.02,
            clearcoat: 0.8, clearcoatRoughness: 0.05
        });
        return new THREE.Mesh(geo, mat);
    }

    // ===== iframe 嵌入容器 =====
    let currentEmbedContainer = null;

    function showEmbedModel(exhibit) {
        // 移除之前的 iframe
        if (currentEmbedContainer) {
            currentEmbedContainer.remove();
            currentEmbedContainer = null;
        }

        // 创建 iframe 容器
        const container = document.createElement('div');
        container.className = 'embed-container';
        
        // 创建关闭按钮
        const closeBtn = document.createElement('button');
        closeBtn.className = 'embed-close';
        closeBtn.innerHTML = '✕';
        closeBtn.onclick = function() {
            container.remove();
            currentEmbedContainer = null;
        };
        container.appendChild(closeBtn);

        // 创建 iframe
        const iframe = document.createElement('iframe');
        iframe.src = exhibit.embedUrl;
        iframe.allowFullscreen = true;
        container.appendChild(iframe);

        document.body.appendChild(container);
        currentEmbedContainer = container;

        // 更新信息面板
        updateInfo(exhibit);
        
        // 更新按钮状态
        document.querySelectorAll('.model-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === currentIndex);
        });
    }

    // ===== 展示模型 =====
    function showModel(index) {
        currentIndex = index;
        const exhibit = exhibits[index];

        // 移除之前的 iframe
        if (currentEmbedContainer) {
            currentEmbedContainer.remove();
            currentEmbedContainer = null;
        }

        if (currentModelGroup) {
            scene.remove(currentModelGroup);
            currentModelGroup = null;
        }

        // 根据模型类型选择加载方式
        if (exhibit.isGLB) {
            loadGLBModel(exhibit);
        } else if (exhibit.isOBJ) {
            loadOBJModel(exhibit);
        } else if (exhibit.isFBX) {
            loadFBXModel(exhibit);
        } else if (exhibit.isEmbed) {
            showEmbedModel(exhibit);
        } else if (exhibit.modelType === 'dingVase') {
            currentModelGroup = buildDingVase();
            finalizeModel(exhibit);
        } else if (exhibit.buildModel) {
            currentModelGroup = exhibit.buildModel();
            finalizeModel(exhibit);
        }
    }

    function loadFBXModel(exhibit) {
        const loader = new THREE.FBXLoader();
        loader.load(
            exhibit.modelPath,
            function(object) {
                currentModelGroup = object;
                
                // 自动缩放和居中
                const box = new THREE.Box3().setFromObject(currentModelGroup);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                // 缩放至合适大小
                const targetSize = 3.5;
                const scale = targetSize / maxDim;
                currentModelGroup.scale.setScalar(scale);
                
                // 居中
                currentModelGroup.position.x = -center.x * scale;
                currentModelGroup.position.y = -center.y * scale + size.y * scale / 2;
                currentModelGroup.position.z = -center.z * scale;
                
                // 启用阴影
                currentModelGroup.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            },
            function(progress) {
                console.log('FBX 加载进度:', (progress.loaded / progress.total * 100) + '%');
            },
            function(error) {
                console.error('FBX 加载失败:', error);
                currentModelGroup = buildFallbackModel();
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            }
        );
    }

    function loadOBJModel(exhibit) {
        // 直接加载OBJ，不使用MTL，统一使用亮木头材质
        const loader = new THREE.OBJLoader();
        loader.load(
            exhibit.modelPath,
            function(object) {
                currentModelGroup = object;
                
                // 为所有mesh设置亮木头材质
                currentModelGroup.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0xd4a574,
                            roughness: 0.4,
                            metalness: 0.05,
                        });
                    }
                });
                
                setupAndAddModel(exhibit);
            },
            function(progress) {
                console.log('OBJ 加载进度:', (progress.loaded / progress.total * 100) + '%');
            },
            function(error) {
                console.error('OBJ 加载失败:', error);
                currentModelGroup = buildFallbackModel();
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            }
        );
    }
    
    function loadOBJWithoutMTL(exhibit) {
        const loader = new THREE.OBJLoader();
        loader.load(
            exhibit.modelPath,
            function(object) {
                currentModelGroup = object;
                
                // 只为没有材质的mesh设置默认材质
                currentModelGroup.traverse((child) => {
                    if (child.isMesh && (!child.material || (Array.isArray(child.material) && child.material.length === 0))) {
                        child.material = new THREE.MeshStandardMaterial({
                            color: 0xf5f0e8,
                            roughness: 0.3,
                            metalness: 0.1
                        });
                    }
                });
                
                setupAndAddModel(exhibit);
            },
            function(progress) {
                console.log('OBJ 加载进度:', (progress.loaded / progress.total * 100) + '%');
            },
            function(error) {
                console.error('OBJ 加载失败:', error);
                currentModelGroup = buildFallbackModel();
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            }
        );
    }
    
    function setupAndAddModel(exhibit) {
        // 自动缩放和居中
        const box = new THREE.Box3().setFromObject(currentModelGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        
        // 缩放至合适大小 - 与其他模型一致
        const targetSize = 3.5;
        const scale = targetSize / maxDim;
        currentModelGroup.scale.setScalar(scale);
        
        // 居中 - XZ平面居中
        currentModelGroup.position.x = -center.x * scale;
        currentModelGroup.position.z = -center.z * scale;
        
        // Y轴位置：从底部开始放置，确保模型站在展台上
        const bottomY = box.min.y * scale;
        currentModelGroup.position.y = -bottomY;
        
        // 启用阴影
        currentModelGroup.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        
        scene.add(currentModelGroup);
        finalizeModel(exhibit);
    }

    function loadGLBModel(exhibit) {
        const loader = new THREE.GLTFLoader();
        loader.load(
            exhibit.modelPath,
            function(gltf) {
                currentModelGroup = gltf.scene;
                
                // 自动缩放和居中
                const box = new THREE.Box3().setFromObject(currentModelGroup);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                // 缩放至合适大小
                const targetSize = 3.5;
                const scale = targetSize / maxDim;
                currentModelGroup.scale.setScalar(scale);
                
                // 居中 - XZ平面居中，Y轴从底部放置
                currentModelGroup.position.x = -center.x * scale;
                currentModelGroup.position.z = -center.z * scale;
                const bottomY = box.min.y * scale;
                currentModelGroup.position.y = -bottomY;
                
                // 启用阴影
                currentModelGroup.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            },
            function(progress) {
                console.log('加载进度:', (progress.loaded / progress.total * 100) + '%');
            },
            function(error) {
                console.error('GLB 加载失败:', error);
                // 加载失败时显示占位模型
                currentModelGroup = buildFallbackModel();
                scene.add(currentModelGroup);
                finalizeModel(exhibit);
            }
        );
    }

    function buildFallbackModel() {
        const group = new THREE.Group();
        const geo = new THREE.BoxGeometry(1, 1.5, 0.1);
        const mat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        group.add(mesh);
        return group;
    }

    function finalizeModel(exhibit) {
        const box = new THREE.Box3().setFromObject(currentModelGroup);
        const size = box.getSize(new THREE.Vector3());
        
        updateInfo(exhibit);

        document.querySelectorAll('.model-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === currentIndex);
        });

        // 根据展品类型调整视角
        if (currentIndex === 1) { // 辛集玉雕
            controls.target.set(0, size.y * 0.4 + currentModelGroup.position.y, 0);
            camera.position.set(4, 3, 6);
        } else if (currentIndex === 2) { // 皮影戏 - 取中间位置
            controls.target.set(0, size.y * 0.3 + currentModelGroup.position.y, 0);
            camera.position.set(0, 3, 7);
        } else if (currentIndex === 4) { // 曲阳石雕 - 取中间位置
            controls.target.set(0, size.y * 0.3 + currentModelGroup.position.y, 0);
            camera.position.set(0, 3, 7);
        } else {
            controls.target.set(0, size.y / 2 + currentModelGroup.position.y, 0);
            camera.position.set(3, 2.5, 5);
        }
        controls.update();
    }

    function updateInfo(exhibit) {
        document.getElementById('infoTitle').textContent = exhibit.name;
        document.getElementById('infoSubtitle').textContent = exhibit.en;
        document.getElementById('infoDesc').textContent = exhibit.desc;
        document.getElementById('metaOrigin').textContent = exhibit.origin;
        document.getElementById('metaCategory').textContent = exhibit.category;
        document.getElementById('metaBatch').textContent = exhibit.batch;
        document.getElementById('metaCode').textContent = exhibit.code;
        document.querySelector('.info-tag').textContent = exhibit.tag;
    }

    function createButtons() {
        const panel = document.getElementById('modelPanel');
        exhibits.forEach((exhibit, i) => {
            const btn = document.createElement('div');
            btn.className = 'model-btn' + (i === 0 ? ' active' : '');
            btn.innerHTML = exhibit.icon + '<span class="tooltip">' + exhibit.name + '</span>';
            btn.addEventListener('click', () => showModel(i));
            panel.appendChild(btn);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        if (currentModelGroup) {
            currentModelGroup.rotation.y += delta * 0.15;
        }

        if (particleSystem) {
            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 1] += Math.sin(elapsed + i) * 0.001;
                if (positions[i + 1] > 15) positions[i + 1] = 0;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
            particleSystem.rotation.y = elapsed * 0.02;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
    </script>
</body>
</html>
